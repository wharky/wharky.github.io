name: Daily ServiceNow Post (23:00 UTC)

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-lore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Lore Generator
        env:
          GAK: ${{ secrets.GAK }}
        # 인자로 'lore'를 넘겨줍니다.
        run: java generator/src/main/java/BlogPoster.java servicenow

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _posts/
          git commit -m "Auto-post: Service Now Contents" || echo "No changes"
          git push
